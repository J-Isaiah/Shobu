services:
  backend:
    build: ./backend
    container_name: shobu-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ISAIAH_PLAYER_ID: ${ISAIAH_PLAYER_ID}
      JULIA_PLAYER_ID: ${JULIA_PLAYER_ID}
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: shobu-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  postgres:
    image: postgres:17
    container_name: shobu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - shobu-postgres-data:/var/lib/postgresql/data

volumes:
  shobu-postgres-data: